<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我们的时光</title>
    <style>
        :root {
            --primary: #e91e63;
            --primary-light: #fce4ec;
            --bg-start: #fdf2f8;
            --bg-end: #fce4ec;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text2: #666666;
            --text3: #999999;
            --border: #f0f0f0;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --radius: 20px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); min-height: 100vh; color: var(--text); }

        /* 加载 */
        .loading { position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading-heart { font-size: 56px; animation: heartbeat 1.2s ease-in-out infinite; }
        .loading-text { color: var(--text2); margin-top: 16px; font-size: 14px; letter-spacing: 2px; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.15); } 50% { transform: scale(1); } 75% { transform: scale(1.1); } }

        /* 登录页 */
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }
        .login-bg { position: absolute; inset: 0; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); z-index: 0; }
        .login-bg::before { content: ''; position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(233,30,99,0.12) 0%, transparent 70%); border-radius: 50%; top: -150px; right: -150px; animation: float 8s ease-in-out infinite; }
        .login-bg::after { content: ''; position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,188,212,0.1) 0%, transparent 70%); border-radius: 50%; bottom: -100px; left: -100px; animation: float 10s ease-in-out infinite reverse; }
        .login-stars { position: absolute; inset: 0; z-index: 0; }
        .login-card { width: 100%; max-width: 400px; background: rgba(255,255,255,0.96); backdrop-filter: blur(40px); border-radius: 40px; box-shadow: 0 30px 80px rgba(0,0,0,0.15); padding: 56px 40px; text-align: center; position: relative; z-index: 1; border: 1px solid rgba(255,255,255,0.6); }
        .login-header { margin-bottom: 36px; }
        .login-avatar { width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary), var(--primary)); border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 48px; box-shadow: 0 16px 48px rgba(233,30,99,0.35); animation: float 3s ease-in-out infinite; border: 4px solid rgba(255,255,255,0.8); color: white; }
        .login-avatar svg { width: 56px; height: 56px; }
        .login-title { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; letter-spacing: 3px; }
        .login-desc { font-size: 14px; color: var(--text3); margin-bottom: 16px; font-weight: 500; }
        .login-divider { width: 40px; height: 3px; background: linear-gradient(90deg, transparent, var(--primary), transparent); margin: 0 auto; }
        .login-form { margin-bottom: 32px; }
        .login-input-wrap { position: relative; margin-bottom: 16px; }
        .login-input { width: 100%; padding: 18px 20px; border: 2px solid var(--border); border-radius: 18px; font-size: 15px; transition: all 0.3s; background: #fafafa; font-weight: 500; }
        .login-input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 5px rgba(233,30,99,0.1); }
        .login-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--primary)); color: white; border: none; border-radius: 18px; font-size: 17px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: all 0.3s; letter-spacing: 3px; box-shadow: 0 12px 32px rgba(233,30,99,0.3); }
        .login-btn:active { transform: scale(0.97); box-shadow: 0 6px 16px rgba(233,30,99,0.2); }
        .login-error { color: #e53935; font-size: 13px; margin-top: 14px; font-weight: 600; }
        .login-footer { padding-top: 28px; border-top: 2px solid var(--border); }
        .login-accounts { display: flex; align-items: center; justify-content: space-around; }
        .account-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
        .account-emoji { font-size: 28px; }
        .account-name { font-size: 13px; font-weight: 700; color: var(--text); }
        .account-divider { width: 1px; height: 40px; background: var(--border); }

        /* 主应用 */
        .app { display: none; flex-direction: column; min-height: 100vh; }
        .app.active { display: flex; }

        /* 头部 */
        .header { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .header-title { font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .header-title svg { color: var(--primary); }
        .logout-btn { padding: 8px 16px; background: var(--primary-light); color: var(--primary); border: none; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* 导航 */
        .nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); padding: 12px 16px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .nav::-webkit-scrollbar { display: none; }
        .nav-btn { padding: 10px 16px; background: transparent; border: none; border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text2); white-space: nowrap; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 6px; }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(233,30,99,0.25); }

        /* 内容 */
        .content { flex: 1; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeUp 0.35s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* 首页 */
        .home-avatar-wrap { text-align: center; padding: 36px 20px 28px; }
        .home-avatar { width: 96px; height: 96px; background: linear-gradient(135deg, var(--primary), var(--primary)); border-radius: 50%; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; box-shadow: 0 12px 36px rgba(233,30,99,0.3); }
        .home-name { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
        .home-quote { font-size: 13px; color: var(--text3); }

        .days-card { background: var(--surface); border-radius: var(--radius); padding: 32px; text-align: center; box-shadow: var(--shadow); margin-bottom: 20px; position: relative; overflow: hidden; background-size: cover; background-position: center; }
        .days-card::before { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.85); z-index: 0; }
        .days-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary)); z-index: 1; }
        .days-card > * { position: relative; z-index: 2; }
        .days-card-actions { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
        .days-card-btn { padding: 8px 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .days-card-btn:active { transform: scale(0.95); }
        .days-num { font-size: 52px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
        .days-label { font-size: 14px; color: var(--text2); margin-top: 8px; }

        .milestones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
        .milestone { background: var(--surface); border-radius: var(--radius-sm); padding: 18px 8px; text-align: center; box-shadow: var(--shadow); }
        .milestone-icon { width: 36px; height: 36px; background: var(--primary-light); border-radius: 10px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 4px 12px rgba(233,30,99,0.15); }
        .milestone-days { font-size: 13px; font-weight: 700; color: var(--primary); }
        .milestone-label { font-size: 10px; color: var(--text3); margin-top: 3px; }

        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 24px; }
        .feature { background: var(--surface); border-radius: var(--radius); padding: 24px 16px; text-align: center; box-shadow: var(--shadow); cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; }
        .feature::before { content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%; background: radial-gradient(circle, rgba(233,30,99,0.1) 0%, transparent 70%); opacity: 0; transition: opacity 0.3s; }
        .feature:active { transform: scale(0.97); }
        .feature:active::before { opacity: 1; }
        .feature-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--primary), var(--primary)); border-radius: 14px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(233,30,99,0.25); transition: transform 0.2s; color: white; }
        .feature-icon svg { width: 28px; height: 28px; }
        .feature-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .feature-desc { font-size: 11px; color: var(--text3); }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .section-title { font-size: 15px; font-weight: 600; }
        .section-more { font-size: 13px; color: var(--primary); font-weight: 500; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .photo { aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden; background: var(--border); }
        .photo img { width: 100%; height: 100%; object-fit: cover; }

        /* 页面通用 */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 22px; font-weight: 700; }
        .page-btn { padding: 12px 18px; background: linear-gradient(135deg, var(--primary), var(--primary)); color: white; border: none; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(233,30,99,0.2); }
        .page-btn.secondary { background: var(--primary-light); color: var(--primary); box-shadow: none; }

        .cloud-tip { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: var(--radius-sm); color: #2e7d32; font-size: 12px; font-weight: 500; margin-bottom: 16px; }
        .cloud-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 时间线 */
        .timeline { display: flex; flex-direction: column; gap: 14px; }
        .timeline-item { background: var(--surface); border-radius: var(--radius); padding: 18px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); transition: all 0.2s; position: relative; }
        .timeline-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, var(--primary), var(--primary-light)); border-radius: var(--radius) 0 0 var(--radius); }
        .timeline-item:active { transform: translateX(4px); }
        .timeline-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 6px 16px rgba(233,30,99,0.25); color: white; }
        .timeline-icon svg { width: 24px; height: 24px; }
        .timeline-content { flex: 1; }
        .timeline-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .timeline-date { font-size: 12px; color: var(--text3); }
        .timeline-status { font-size: 12px; color: var(--primary); background: var(--primary-light); padding: 6px 12px; border-radius: 20px; font-weight: 600; white-space: nowrap; }

        /* 联系 */
        .contact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .contact { background: var(--surface); border-radius: var(--radius); padding: 24px 16px; text-align: center; text-decoration: none; color: inherit; box-shadow: var(--shadow); display: block; transition: all 0.2s; position: relative; overflow: hidden; }
        .contact::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.5), transparent); opacity: 0; transition: opacity 0.3s; }
        .contact:active { transform: scale(0.97); }
        .contact:active::before { opacity: 1; }
        .contact-icon { width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 6px 16px rgba(0,0,0,0.15); transition: transform 0.2s; color: white; }
        .contact-icon svg { width: 28px; height: 28px; }
        .contact:active .contact-icon { transform: scale(1.1); }
        .contact-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .contact-value { font-size: 11px; color: var(--text3); }

        /* 空状态 */
        .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
        .empty-icon { font-size: 56px; opacity: 0.35; margin-bottom: 16px; }
        .empty-text { font-size: 14px; }
        .empty-sub { font-size: 12px; margin-top: 6px; opacity: 0.7; }

        /* 音乐按钮 */
        .music-btn { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), var(--primary)); border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 8px 28px rgba(233,30,99,0.35); z-index: 99; cursor: pointer; font-size: 24px; }
        .music-btn.active { display: flex; animation: heartbeat 2s infinite; }

        /* 模态框 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 320px; }
        .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .modal textarea { width: 100%; height: 100px; padding: 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; resize: none; }
        .modal textarea:focus { outline: none; border-color: var(--primary); }
        .modal-btns { display: flex; gap: 12px; margin-top: 16px; }
        .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }
        .modal-btns .save { background: linear-gradient(135deg, var(--primary), var(--primary)); color: white; }
        .modal-btns .cancel { background: var(--border); color: var(--text2); }

        @media (max-width: 380px) {
            .milestones { grid-template-columns: repeat(2, 1fr); }
            .feature-grid { grid-template-columns: 1fr; }
            .contact-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-heart">💕</div>
        <div class="loading-text">正在加载...</div>
    </div>

    <audio id="bgMusic" loop controls style="display:none"><source src="https://raw.githubusercontent.com/guyaozsh/hanyao/main/G.E.M.%E9%82%93%E7%B4%AB%E6%A3%8B%20-%20%E5%94%AF%E4%B8%80.mp3" type="audio/mpeg"></audio>
    <div class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</div>

    <div class="login-page" id="loginPage">
        <div class="login-bg"></div>
        <div class="login-stars"></div>
        <div class="login-card">
            <div class="login-header">
                <div class="login-avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
                <h1 class="login-title">我们的时光</h1>
                <p class="login-desc">记录在一起的每一天</p>
                <div class="login-divider"></div>
            </div>
            <div class="login-form">
                <div class="login-input-wrap">
                    <input type="text" class="login-input" id="loginPhone" placeholder="账号">
                </div>
                <div class="login-input-wrap">
                    <input type="password" class="login-input" id="loginPassword" placeholder="密码">
                </div>
                <button class="login-btn" onclick="login()">进入我们的世界</button>
                <p class="login-error" id="loginError"></p>
            </div>
        </div>
    </div>

    <div class="app" id="app">
        <header class="header">
            <div class="header-title"><svg viewBox="0 0 24 24" fill="currentColor" style="width:24px;height:24px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> 我们的时光</div>
            <button class="logout-btn" onclick="logout()">退出</button>
        </header>

        <nav class="nav">
            <button class="nav-btn active" onclick="showPage('home')">首页</button>
            <button class="nav-btn" onclick="showPage('photos')">照片</button>
            <button class="nav-btn" onclick="showPage('timeline')">时间线</button>
            <button class="nav-btn" onclick="showPage('contact')">联系</button>
        </nav>

        <main class="content">
            <div class="page active" id="homePage">
                <div class="home-avatar-wrap">
                    <div class="home-avatar" id="userAvatar">尧</div>
                    <h2 class="home-name" id="userName">范忠尧</h2>
                    <p class="home-quote">愿得一人心，白首不分离</p>
                </div>

                <div class="days-card" id="daysCard">
                    <div class="days-num" id="daysCounter">0天</div>
                    <div class="days-label">在一起的日子</div>
                    <div class="days-card-actions">
                        <button class="days-card-btn" onclick="addToDesktop()">📌 添加卡片</button>
                        <button class="days-card-btn" onclick="setBgImage()">🖼️ 设置背景</button>
                    </div>
                </div>

                <div class="milestones">
                    <div class="milestone"><div class="milestone-icon">✨</div><div class="milestone-days" id="m100">0天</div><div class="milestone-label">100天</div></div>
                    <div class="milestone"><div class="milestone-icon">💖</div><div class="milestone-days" id="m520">0天</div><div class="milestone-label">520天</div></div>
                    <div class="milestone"><div class="milestone-icon">💎</div><div class="milestone-days" id="m999">0天</div><div class="milestone-label">999天</div></div>
                    <div class="milestone"><div class="milestone-icon">👑</div><div class="milestone-days" id="m1314">0天</div><div class="milestone-label">1314天</div></div>
                </div>

                <div class="feature-grid">
                    <div class="feature" onclick="showPage('photos')"><div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div><div class="feature-title">照片墙</div><div class="feature-desc">记录美好瞬间</div></div>
                    <div class="feature" onclick="showPage('timeline')"><div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/><circle cx="12" cy="12" r="1"/></svg></div><div class="feature-title">时间线</div><div class="feature-desc">我们的回忆</div></div>
                    <div class="feature" onclick="showPage('contact')"><div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div><div class="feature-title">联系TA</div><div class="feature-desc">一键拨打</div></div>
                    <div class="feature" onclick="toggleMusic()"><div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13M9 9l12-2"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><div class="feature-title">背景音乐</div><div class="feature-desc">唯一 - 邓紫棋</div></div>
                </div>

                <div class="section-header"><div class="section-title">📸 最新照片</div><div class="section-more" onclick="showPage('photos')">查看全部 →</div></div>
                <div class="photo-grid" id="homePhotos"></div>
            </div>

            <div class="page" id="photosPage">
                <div class="page-header">
                    <h2 class="page-title">照片墙</h2>
                    <div>
                        <button class="page-btn secondary" onclick="document.getElementById('photoInput').click()">+ 上传</button>
                    </div>
                </div>
                <div class="photo-grid" id="photoGrid"></div>
                <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="uploadPhoto(event)">
            </div>

            <div class="page" id="timelinePage">

            var files = Array.from(e.target.files);

            var photos = [];
            if (localPhotos) {
                try {
                    photos = JSON.parse(localPhotos);
                } catch(e) {}
            }
            
            for (var k = 0; k < files.length; k++) {
                (function(file) {
                    if (file.size > 10 * 1024 * 1024) {
                        alert('文件过大（超过10MB），请选择更小的图片');
                        return;
                    }
                    
                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        photos.push({
                            id: Date.now() + Math.random(),
                            url: ev.target.result,
                            uploader: user.name,
                            created_at: new Date().toISOString(),
                            description: ''
                        });
                        localStorage.setItem('photos_' + user.phone, JSON.stringify(photos));
                        loadPhotos();
                    };
                    reader.onerror = function() {
                        alert('读取文件失败');
                    };
                    reader.readAsDataURL(file);
                })(files[k]);
            }
            e.target.value = '';
