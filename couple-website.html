<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我们的时光</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.staticfile.org/lucide/0.453.0/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #e91e63;
            --primary-light: #f8bbd9;
            --primary-dark: #c2185b;
            --bg: linear-gradient(135deg, #fdf2f8 0%, #fce4ec 100%);
            --surface: #ffffff;
            --text: #2d2d2d;
            --text-secondary: #757575;
            --border: #f5f5f5;
            --shadow: 0 2px 12px rgba(233, 30, 99, 0.08);
            --shadow-lg: 0 8px 30px rgba(233, 30, 99, 0.12);
            --radius: 16px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

        .loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loading.hidden { display: none; }
        .loading-icon { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; animation: pulse 1.5s infinite; }
        .loading-icon i { color: white; width: 30px; height: 30px; }
        .loading-text { color: var(--text-secondary); font-size: 14px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }

        /* 登录页 */
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .login-card { width: 100%; max-width: 360px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 40px 32px; }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-icon { width: 72px; height: 72px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: var(--shadow-lg); }
        .login-icon i { color: white; width: 36px; height: 36px; }
        .login-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-subtitle { font-size: 14px; color: var(--text-secondary); }
        .login-form { display: flex; flex-direction: column; gap: 16px; }
        .login-input { width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; transition: border-color 0.2s; }
        .login-input:focus { outline: none; border-color: var(--primary); }
        .login-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .login-error { color: #e53935; font-size: 13px; text-align: center; margin-top: 12px; }

        /* 主应用 */
        .app { display: none; flex-direction: column; min-height: 100vh; }
        .app.active { display: flex; }

        /* 头部 */
        .app-header { background: var(--surface); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .app-title { font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .app-title i { width: 24px; height: 24px; }
        .app-logout { padding: 8px 16px; background: var(--primary-light); color: var(--primary); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; }

        /* 导航 */
        .app-nav { background: var(--surface); padding: 12px 16px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
        .app-nav::-webkit-scrollbar { display: none; }
        .nav-item { padding: 10px 18px; background: transparent; border: none; border-radius: 20px; font-size: 14px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .nav-item i { width: 18px; height: 18px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item.active i { color: white; }

        /* 内容区 */
        .app-content { flex: 1; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 首页 - 用户信息 */
        .user-section { text-align: center; padding: 32px 20px; }
        .user-avatar { width: 88px; height: 88px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 36px; color: white; box-shadow: var(--shadow-lg); }
        .user-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .user-quote { font-size: 14px; color: var(--text-secondary); }

        /* 天数卡片 */
        .days-card { background: var(--surface); border-radius: var(--radius); padding: 32px; text-align: center; box-shadow: var(--shadow); margin-bottom: 20px; position: relative; overflow: hidden; }
        .days-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary)); }
        .days-number { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .days-label { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

        /* 里程碑 */
        .milestones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
        .milestone { background: var(--surface); border-radius: var(--radius-sm); padding: 16px 8px; text-align: center; box-shadow: var(--shadow); }
        .milestone-icon { width: 40px; height: 40px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
        .milestone-icon i { width: 20px; height: 20px; color: var(--primary); }
        .milestone-days { font-size: 13px; font-weight: 600; color: var(--primary); }
        .milestone-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        /* 功能网格 */
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 24px; }
        .feature-card { background: var(--surface); border-radius: var(--radius); padding: 24px 16px; text-align: center; box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s; }
        .feature-card:active { transform: scale(0.98); }
        .feature-card:hover { box-shadow: var(--shadow-lg); }
        .feature-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
        .feature-icon i { width: 26px; height: 26px; color: white; }
        .feature-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .feature-desc { font-size: 12px; color: var(--text-secondary); }

        /* 照片网格 */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .section-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title i { width: 20px; height: 20px; color: var(--primary); }
        .section-more { font-size: 13px; color: var(--primary); font-weight: 500; cursor: pointer; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .photo-item { aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden; background: var(--border); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        /* 页面头部 */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .page-title i { width: 24px; height: 24px; color: var(--primary); }
        .page-btn { padding: 10px 18px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .page-btn i { width: 18px; height: 18px; }
        .page-btn.secondary { background: var(--primary-light); color: var(--primary); }

        /* 云端提示 */
        .cloud-tip { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: var(--radius-sm); color: #2e7d32; font-size: 13px; font-weight: 500; margin-bottom: 16px; }
        .cloud-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* 时间线 */
        .timeline-list { display: flex; flex-direction: column; gap: 14px; }
        .timeline-item { background: var(--surface); border-radius: var(--radius); padding: 18px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); }
        .timeline-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .timeline-icon i { width: 24px; height: 24px; color: white; }
        .timeline-content { flex: 1; }
        .timeline-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .timeline-date { font-size: 13px; color: var(--text-secondary); }
        .timeline-status { font-size: 12px; color: var(--primary); background: var(--primary-light); padding: 6px 12px; border-radius: 20px; font-weight: 600; }

        /* 联系卡片 */
        .contact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .contact-card { background: var(--surface); border-radius: var(--radius); padding: 24px 16px; text-align: center; text-decoration: none; color: inherit; box-shadow: var(--shadow); transition: all 0.2s; }
        .contact-card:active { transform: scale(0.98); }
        .contact-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
        .contact-icon i { width: 26px; height: 26px; color: white; }
        .contact-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .contact-value { font-size: 12px; color: var(--text-secondary); }

        /* 备忘录 */
        .memo-input { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .memo-input textarea { width: 100%; height: 80px; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; resize: none; }
        .memo-input textarea:focus { outline: none; border-color: var(--primary); }
        .memo-input button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; margin-top: 10px; cursor: pointer; }
        .memo-list { display: flex; flex-direction: column; gap: 12px; }
        .memo-item { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
        .memo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .memo-author { font-size: 13px; font-weight: 600; color: var(--primary); }
        .memo-date { font-size: 12px; color: var(--text-secondary); }
        .memo-text { font-size: 14px; line-height: 1.6; color: #555; }
        .memo-delete { background: none; border: none; color: #e53935; cursor: pointer; padding: 4px; }
        .memo-delete i { width: 18px; height: 18px; }

        /* 天气 */
        .weather-card { background: linear-gradient(135deg, #5c6bc0, #3949ab); color: white; border-radius: var(--radius); padding: 32px; text-align: center; margin-bottom: 20px; box-shadow: var(--shadow-lg); }
        .weather-icon { font-size: 64px; margin-bottom: 8px; }
        .weather-temp { font-size: 56px; font-weight: 700; }
        .weather-desc { font-size: 18px; opacity: 0.95; margin-top: 4px; }
        .weather-city { font-size: 14px; opacity: 0.8; margin-top: 8px; }
        .weather-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .weather-detail { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: var(--radius-sm); padding: 16px; text-align: center; }
        .weather-label { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
        .weather-value { font-size: 16px; font-weight: 600; }

        /* 经期 */
        .period-card { background: var(--surface); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .period-status { text-align: center; padding: 24px; background: linear-gradient(135deg, #fce4ec, #f8bbd9); border-radius: var(--radius-sm); margin-bottom: 20px; }
        .period-icon { font-size: 48px; margin-bottom: 8px; }
        .period-text { font-size: 18px; font-weight: 700; color: var(--primary); }
        .period-sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .period-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .period-info { background: #fafafa; border-radius: var(--radius-sm); padding: 16px; text-align: center; }
        .period-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .period-value { font-size: 16px; font-weight: 700; color: var(--primary); }
        .period-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 20px; }
        .cal-header { text-align: center; font-size: 12px; color: var(--text-secondary); font-weight: 600; padding: 8px 0; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 50%; }
        .cal-day.today { background: var(--primary); color: white; font-weight: 700; }
        .cal-day.period { background: #ffcdd2; color: #c62828; }
        .cal-day.ovulation { background: #ffe0b2; color: #e65100; }
        .cal-day.safe { background: #c8e6c9; color: #2e7d32; }
        .cal-day.empty { opacity: 0; }
        .period-input { margin-top: 20px; }
        .period-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
        .period-row label { width: 70px; font-size: 14px; color: var(--text-secondary); }
        .period-row input { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; }
        .period-row input:focus { outline: none; border-color: var(--primary); }
        .period-row button { padding: 12px 20px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-icon { width: 64px; height: 64px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .empty-icon i { width: 32px; height: 32px; color: var(--text-secondary); }
        .empty-text { font-size: 14px; }
        .empty-sub { font-size: 12px; margin-top: 4px; }

        /* 音乐按钮 */
        .music-btn { position: fixed; bottom: 88px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: var(--shadow-lg); z-index: 99; cursor: pointer; }
        .music-btn.active { display: flex; }
        .music-btn i { width: 28px; height: 28px; color: white; }

        /* 模态框 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 340px; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .modal textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; resize: none; }
        .modal textarea:focus { outline: none; border-color: var(--primary); }
        .modal-btns { display: flex; gap: 12px; margin-top: 16px; }
        .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }
        .modal-btns .save { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .modal-btns .cancel { background: var(--border); color: var(--text-secondary); }

        @media (max-width: 380px) {
            .milestones { grid-template-columns: repeat(2, 1fr); }
            .feature-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-icon"><i data-lucide="heart"></i></div>
        <div class="loading-text">正在加载...</div>
    </div>

    <!-- 登录页 -->
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon"><i data-lucide="heart"></i></div>
                <h1 class="login-title">我们的时光</h1>
                <p class="login-subtitle">记录在一起的每一天</p>
            </div>
            <div class="login-form">
                <input type="text" class="login-input" id="loginPhone" placeholder="账号">
                <input type="password" class="login-input" id="loginPassword" placeholder="密码">
                <button class="login-btn" onclick="login()">登 录</button>
                <p class="login-error" id="loginError"></p>
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div class="app" id="app">
        <header class="app-header">
            <h1 class="app-title"><i data-lucide="heart"></i> 我们的时光</h1>
            <button class="app-logout" onclick="logout()">退出</button>
        </header>

        <nav class="app-nav">
            <button class="nav-item active" onclick="showPage('home')"><i data-lucide="home"></i>首页</button>
            <button class="nav-item" onclick="showPage('photos')"><i data-lucide="image"></i>照片</button>
            <button class="nav-item" onclick="showPage('timeline')"><i data-lucide="calendar"></i>时间线</button>
            <button class="nav-item" onclick="showPage('contact')"><i data-lucide="phone"></i>联系</button>
            <button class="nav-item" onclick="showPage('period')"><i data-lucide="flower-2"></i>经期</button>
            <button class="nav-item" onclick="showPage('memo')"><i data-lucide="sticky-note"></i>备忘</button>
            <button class="nav-item" onclick="showPage('weather')"><i data-lucide="cloud-sun"></i>天气</button>
        </nav>

        <main class="app-content">
            <!-- 首页 -->
            <div class="page active" id="homePage">
                <div class="user-section">
                    <div class="user-avatar" id="userAvatar">尧</div>
                    <h2 class="user-name" id="userName">范忠尧</h2>
                    <p class="user-quote">愿得一人心，白首不分离</p>
                </div>

                <div class="days-card">
                    <div class="days-number" id="daysCounter">0天</div>
                    <div class="days-label">在一起的日子</div>
                </div>

                <div class="milestones">
                    <div class="milestone">
                        <div class="milestone-icon"><i data-lucide="sparkles"></i></div>
                        <div class="milestone-days" id="m100">0天</div>
                        <div class="milestone-label">100天</div>
                    </div>
                    <div class="milestone">
                        <div class="milestone-icon"><i data-lucide="heart"></i></div>
                        <div class="milestone-days" id="m520">0天</div>
                        <div class="milestone-label">520天</div>
                    </div>
                    <div class="milestone">
                        <div class="milestone-icon"><i data-lucide="gem"></i></div>
                        <div class="milestone-days" id="m999">0天</div>
                        <div class="milestone-label">999天</div>
                    </div>
                    <div class="milestone">
                        <div class="milestone-icon"><i data-lucide="crown"></i></div>
                        <div class="milestone-days" id="m1314">0天</div>
                        <div class="milestone-label">1314天</div>
                    </div>
                </div>

                <div class="feature-grid">
                    <div class="feature-card" onclick="showPage('photos')">
                        <div class="feature-icon"><i data-lucide="image"></i></div>
                        <div class="feature-title">照片墙</div>
                        <div class="feature-desc">记录美好瞬间</div>
                    </div>
                    <div class="feature-card" onclick="showPage('timeline')">
                        <div class="feature-icon"><i data-lucide="calendar"></i></div>
                        <div class="feature-title">时间线</div>
                        <div class="feature-desc">我们的回忆</div>
                    </div>
                    <div class="feature-card" onclick="showPage('contact')">
                        <div class="feature-icon"><i data-lucide="phone"></i></div>
                        <div class="feature-title">联系TA</div>
                        <div class="feature-desc">一键拨打</div>
                    </div>
                    <div class="feature-card" onclick="toggleMusic()">
                        <div class="feature-icon"><i data-lucide="music"></i></div>
                        <div class="feature-title">背景音乐</div>
                        <div class="feature-desc">唯一 - 邓紫棋</div>
                    </div>
                </div>

                <div class="section-header">
                    <div class="section-title"><i data-lucide="image"></i>最新照片</div>
                    <div class="section-more" onclick="showPage('photos')">查看全部 →</div>
                </div>
                <div class="photo-grid" id="homePhotos"></div>
            </div>

            <!-- 照片页 -->
            <div class="page" id="photosPage">
                <div class="page-header">
                    <h2 class="page-title"><i data-lucide="image"></i>照片墙</h2>
                    <div>

    <script>
        // Lucide 图标初始化
        if (window.lucide) lucide.createIcons();

        // Supabase 配置
        const SUPABASE_URL = 'https://qofxyhnrlrzwqkwunmgm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvZnh5aG5ybHJ6d3Frd3VubWdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDI5ODAsImV4cCI6MjA5MDQxODk4MH0.nBqcQV_CZ8wViRWZDbLZ68Qe0wYbs4x29i8G1Ra_v04';

        } catch(e) { console.log('Supabase init error:', e); }

        // 用户数据
        const users = {
            '18285864539': { pwd: 'zsh520', name: '范忠尧', avatar: '尧' },
            '15052064683': { pwd: 'fzy520', name: '郑思涵', avatar: '涵' }
        };
        const partner = {
            '18285864539': { name: '郑思涵', phone: '15052064683', qq: '2731778277' },
            '15052064683': { name: '范忠尧', phone: '18285864539', qq: '3502109698' }
        };
        const startDate = new Date('2024-11-28');
        let currentUser = null;
        let selectedPhotos = [];
        let currentPhotoId = null;

        // 隐藏 loading
        document.getElementById('loading').classList.add('hidden');

        // 登录
        function login() {
            const phone = document.getElementById('loginPhone').value;
            const pwd = document.getElementById('loginPassword').value;
            if (users[phone] && users[phone].pwd === pwd) {
                currentUser = { phone, ...users[phone] };
                localStorage.setItem('couple_user', JSON.stringify(currentUser));
                showApp();
            } else {
                document.getElementById('loginError').textContent = '账号或密码错误';
            }
        }

        // 退出
        function logout() {
            currentUser = null;
            localStorage.removeItem('couple_user');
            document.getElementById('app').classList.remove('active');
            document.getElementById('loginPage').style.display = 'flex';
        }

        // 显示主应用
        async function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('app').classList.add('active');
            document.getElementById('userAvatar').textContent = currentUser.avatar;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('musicBtn').classList.add('active');
            
            updateDays();
            await Promise.all([loadPhotos(), loadMemos(), loadPeriod()]);
            if (window.lucide) lucide.createIcons();
        }

        // 更新天数
        function updateDays() {
            const days = Math.floor((new Date() - startDate) / 86400000);
            document.getElementById('daysCounter').textContent = days + '天';
            [
                {id:'m100', t:100}, {id:'m520', t:520}, {id:'m999', t:999}, {id:'m1314', t:1314}
            ].forEach(m => {
                document.getElementById(m.id).textContent = days >= m.t ? '✓' : (m.t - days) + '天';
            });
        }

        // 切换页面
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            const navs = document.querySelectorAll('.nav-item');
            const map = {home:0, photos:1, timeline:2, contact:3, period:4, memo:5, weather:6};
            if (navs[map[page]]) navs[map[page]].classList.add('active');
            if (page === 'weather') loadWeather();
            if (window.lucide) lucide.createIcons();
        }

        // 加载照片
        async function loadPhotos() {
            let photos = [];
            if (client) {
                try {
                    const { data } = await client.from('photos').select('*').order('created_at', { ascending: false });
                    photos = data || [];
                } catch(e) { console.log('Load photos error:', e); }
            }
            const grid = document.getElementById('photoGrid');
            const homeGrid = document.getElementById('homePhotos');
            const html = photos.length ? photos.map(p => 
                `<div class="photo-item" onclick="${selectedPhotos.length ? 'toggleSel('+p.id+')' : 'openDesc('+p.id+)'}"><img src="${p.url}" alt=""></div>`
            ).join('') : '';
            grid.innerHTML = html || '<div class="empty-state"><div class="empty-icon"><i data-lucide="image"></i></div><div class="empty-text">暂无照片</div><div class="empty-sub">点击上传添加照片</div></div>';
            homeGrid.innerHTML = photos.length ? photos.slice(0,6).map(p => `<div class="photo-item"><img src="${p.url}" alt=""></div>`).join('') : '<div class="photo-item"></div>'.repeat(3);
            if (window.lucide) lucide.createIcons();
        }

        // 上传照片
        async function uploadPhoto(e) {
            for (const f of Array.from(e.target.files)) {
                const r = new FileReader();
                r.onload = async ev => {
                    if (client) {
                        try {
                            await client.from('photos').insert({ url: ev.target.result, uploader: currentUser.name });
                        } catch(e) {}
                    }
                    loadPhotos();
                };
                r.readAsDataURL(f);
            }
            e.target.value = '';
        }

        // 选择照片
        function toggleSel(id) {
            const i = selectedPhotos.indexOf(id);
            if (i > -1) selectedPhotos.splice(i, 1);
            else selectedPhotos.push(id);
            loadPhotos();
        }

        function toggleSelect() { selectedPhotos = []; loadPhotos(); alert(selectedPhotos.length ? '已取消' : '选择模式'); }
        
        // 照片描述
        function openDesc(id) { currentPhotoId = id; document.getElementById('descModal').classList.add('active'); }
        function closeModal() { document.getElementById('descModal').classList.remove('active'); currentPhotoId = null; }
        
        async function saveDesc() {
            if (client) {
                try {
                    await client.from('photos').update({ description: document.getElementById('descText').value }).eq('id', currentPhotoId);
                } catch(e) {}
            }
            closeModal();
            loadPhotos();
        }

        // 时间线
        function renderTimeline() {
            const today = new Date();
            const events = [
                {e:'❤️', t:'在一起', d:'2024-11-28'},
                {e:'💎', t:'100天纪念', d:'2025-03-08'},
                {e:'💖', t:'520天纪念', d:'2026-06-30'},
                {e:'💝', t:'1314天纪念', d:'2028-05-15'}
            ];
            document.getElementById('timelineList').innerHTML = events.map(x => {
                const diff = Math.floor((new Date(x.d) - today) / 86400000);
                const status = diff < 0 ? '已达成 ✓' : diff === 0 ? '就是今天 🎉' : '还有' + diff + '天';
                return `<div class="timeline-item"><div class="timeline-icon"><i data-lucide="heart"></i></div><div class="timeline-content"><div class="timeline-title">${x.t}</div><div class="timeline-date">${x.d}</div></div><div class="timeline-status">${status}</div></div>`;
            }).join('');
            if (window.lucide) lucide.createIcons();
        }

        // 联系
        function renderContact() {
            const p = partner[currentUser.phone];
            const g = currentUser.phone === '18285864539' ? '她' : '他';
            document.getElementById('contactGrid').innerHTML = 
                `<a href="tel:${p.phone}" class="contact-card"><div class="contact-icon" style="background:#4caf50"><i data-lucide="phone"></i></div><div class="contact-name">给${g}打电话</div><div class="contact-value">${p.phone}</div></a>` +
                `<a href="sms:${p.phone}" class="contact-card"><div class="contact-icon" style="background:#2196f3"><i data-lucide="message-circle"></i></div><div class="contact-name">发短信</div><div class="contact-value">${p.phone}</div></a>` +
                `<a href="weixin://" class="contact-card" onclick="alert('请在微信打开')"><div class="contact-icon" style="background:#07c160"><i data-lucide="message-square"></i></div><div class="contact-name">${g}的微信</div><div class="contact-value">点击打开</div></a>` +
                `<a href="mqqwpa://im/chat?uin=${p.qq}" class="contact-card"><div class="contact-icon" style="background:#12b7f5"><i data-lucide="qq"></i></div><div class="contact-name">和${g}QQ聊天</div><div class="contact-value">${p.qq}</div></a>`;
            if (window.lucide) lucide.createIcons();
        }

        // 音乐
        function toggleMusic() {
            const a = document.getElementById('bgMusic');
            a.paused ? a.play() : a.pause();
        }

        // 备忘录
        async function addMemo() {
            const t = document.getElementById('memoInput').value.trim();
            if (!t) return;
            if (client) {
                try {
                    await client.from('memos').insert({ author: currentUser.name, content: t });
                } catch(e) {}
            }
            document.getElementById('memoInput').value = '';
            loadMemos();
        }

        async function loadMemos() {
            let memos = [];
            if (client) {
                try {
                    const { data } = await client.from('memos').select('*').order('created_at', { ascending: false });
                    memos = data || [];
                } catch(e) {}
            }
            document.getElementById('memoList').innerHTML = memos.length ? memos.map(m => 
                `<div class="memo-item"><div class="memo-header"><span class="memo-author">${m.author}</span><span class="memo-date">${new Date(m.created_at).toLocaleString()}</span><button class="memo-delete" onclick="delMemo(${m.id})"><i data-lucide="trash-2"></i></button></div><div class="memo-text">${m.content}</div></div>`
            ).join('') : '<div class="empty-state"><div class="empty-icon"><i data-lucide="sticky-note"></i></div><div class="empty-text">暂无备忘录</div></div>';
            if (window.lucide) lucide.createIcons();
        }

        async function delMemo(id) {
            if (client) {
                try { await client.from('memos').delete().eq('id', id); } catch(e) {}
            }
            loadMemos();
        }

        // 天气
        function loadWeather() {
            document.getElementById('weatherDesc').textContent = '定位中...';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => fetchW(p.coords.latitude, p.coords.longitude), () => fetchW2('贵阳'));
            } else { fetchW2('贵阳'); }
        }

        function fetchW(lat, lon) {
            fetch('https://wttr.in/' + lat + ',' + lon + '?format=j1').then(r => r.json()).then(d => {
                const c = d.current_condition[0];
                updateW(c.temp_C, c.FeelsLikeC, c.humidity, c.windspeedKmph + 'km/h', c.lang_zh ? c.lang_zh[0].value : c.weatherDesc[0].value, d.nearest_area[0].areaName[0].value, getIcon(c.weatherCode));
            }).catch(() => fetchW2('贵阳'));
        }

        function fetchW2(city) {
            fetch('https://wttr.in/' + encodeURIComponent(city) + '?format=j1').then(r => r.json()).then(d => {
                const c = d.current_condition[0];
                updateW(c.temp_C, c.FeelsLikeC, c.humidity, c.windspeedKmph + 'km/h', c.lang_zh ? c.lang_zh[0].value : c.weatherDesc[0].value, city, getIcon(c.weatherCode));
            });
        }

        function updateW(temp, feel, hum, wind, desc, city, icon) {
            document.getElementById('weatherIcon').textContent = icon;
            document.getElementById('weatherTemp').textContent = temp + '°';
            document.getElementById('weatherDesc').textContent = desc;
            document.getElementById('weatherCity').textContent = '📍 ' + city;
            document.getElementById('weatherHum').textContent = hum + '%';
            document.getElementById('weatherWind').textContent = wind;
            document.getElementById('weatherFeel').textContent = feel + '°';
        }

        function getIcon(code) {
            if (code === 113) return '☀️';
            if (code === 116) return '⛅';
            if (code === 119 || code === 122) return '☁️';
            if ([143,248,260].includes(code)) return '🌫️';
            if ([176,263,266,293,296,299,302,305,308,353,356,359].includes(code)) return '🌧️';
            if ([179,182,185,227,230,323,326,329,332,335,338,350,368,371,374,377].includes(code)) return '❄️';
            if ([200,386,389,392,395].includes(code)) return '⛈️';
            return '🌤️';
        }

        // 经期
        async function savePeriod() {
            const lp = document.getElementById('periodInput').value;
            if (!lp) return alert('请选择日期');
            if (client) {
                try {
                    await client.from('period_data').upsert({
                        user_id: currentUser.phone,
                        last_period: lp,
                        cycle_days: +document.getElementById('cycleInput').value || 28,
                        duration_days: +document.getElementById('durationInput').value || 5
                    }, { onConflict: 'user_id' });
                } catch(e) {}
            }
            loadPeriod();
            alert('保存成功');
        }

        async function loadPeriod() {
            let p = {};
            if (client) {
                try {
                    const { data } = await client.from('period_data').select('*').eq('user_id', currentUser.phone).single();
                    p = data || {};
                } catch(e) {}
            }
            const cyc = p.cycle_days || 28, dur = p.duration_days || 5;
            const today = new Date(); today.setHours(0,0,0,0);
            if (p.last_period) {
                document.getElementById('periodInput').value = p.last_period;
                document.getElementById('cycleInput').value = cyc;
                document.getElementById('durationInput').value = dur;
                const last = new Date(p.last_period), next = new Date(last); next.setDate(next.getDate() + cyc);
                const since = Math.floor((today - last) / 86400000), toNext = Math.floor((next - today) / 86400000);
                document.getElementById('lastPeriod').textContent = p.last_period;
                document.getElementById('nextPeriod').textContent = next.toLocaleDateString('zh');
                document.getElementById('cycleDays').textContent = cyc + '天';
                document.getElementById('durationDays').textContent = dur + '天';
                const ic = document.getElementById('periodIcon'), tx = document.getElementById('periodText'), sb = document.getElementById('periodSub');
                if (since < dur) { ic.textContent = '🩸'; tx.textContent = '经期中'; sb.textContent = '第' + (since+1) + '天'; }
                else if (toNext <= 3 && toNext >= 0) { ic.textContent = '⚠️'; tx.textContent = '即将到来'; sb.textContent = '还有' + toNext + '天'; }
                else if (toNext < 0) { ic.textContent = '📅'; tx.textContent = '可能已来'; sb.textContent = '超' + Math.abs(toNext) + '天'; }
                else {
                    const ovu = Math.floor(cyc/2), dayC = since % cyc;
                    if (Math.abs(dayC - ovu) <= 2) { ic.textContent = '🌡️'; tx.textContent = '排卵期'; sb.textContent = '距下次' + toNext + '天'; }
                    else if (dayC < 7 || dayC > cyc-7) { ic.textContent = '✅'; tx.textContent = '安全期'; sb.textContent = '距下次' + toNext + '天'; }
                    else { ic.textContent = '🌸'; tx.textContent = '正常期'; sb.textContent = '距下次' + toNext + '天'; }
                }
            } else {
                document.getElementById('periodIcon').textContent = '🌸';
                document.getElementById('periodText').textContent = '请记录经期';
                document.getElementById('periodSub').textContent = '在上方设置日期';
            }
            renderCal(p);
        }

        function renderCal(p) {
            const cal = document.getElementById('periodCal');
            const today = new Date(), y = today.getFullYear(), m = today.getMonth();
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
            const cyc = p.cycle_days || 28, dur = p.duration_days || 5;
            const last = p.last_period ? new Date(p.last_period) : null;
            let html = '日一二三四五六'.split('').map(d => `<div class="cal-header">${d}</div>`).join('');
            for (let i = 0; i < first; i++) html += '<div class="cal-day empty"></div>';
            for (let d = 1; d <= days; d++) {
                const date = new Date(y, m, d); date.setHours(0,0,0,0);
                let cls = 'cal-day';
                if (date.toDateString() === today.toDateString()) cls += ' today';
                if (last) {
                    const ds = Math.floor((date - last) / 86400000), dc = ((ds % cyc) + cyc) % cyc;
                    if (dc >= 0 && dc < dur && ds >= 0) cls += ' period';
                    else if (Math.abs(dc - Math.floor(cyc/2)) <= 2) cls += ' ovulation';
                    else if (dc < 7 || dc > cyc-7) cls += ' safe';
                }
                html += `<div class="${cls}">${d}</div>`;
            }
            cal.innerHTML = html;
        }

        // 初始化
        window.onload = async function() {
            if (window.lucide) lucide.createIcons();
            const saved = localStorage.getItem('couple_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                await showApp();
            } else {
                document.getElementById('loading').classList.add('hidden');
            }
        };
    </script>
